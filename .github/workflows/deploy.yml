name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          az acr login --name mcpcalculatoracr

      - name: Build and push Docker image
        run: |
          docker build -t mcpcalculatoracr.azurecr.io/mcp-calculator:${{ github.sha }} .
          docker push mcpcalculatoracr.azurecr.io/mcp-calculator:${{ github.sha }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name mcp-calculator \
            --resource-group mcp-rg \
            --image mcpcalculatoracr.azurecr.io/mcp-calculator:${{ github.sha }}